# Supabase CLI project config.
# Generated by default values. Run `supabase init` in this dir to regenerate
# if fields below don't match your Supabase CLI version.

project_id = "reviewhive"

[api]
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
port = 54323

[storage]
file_size_limit = "50MiB"

[auth]
enable_signup = true
site_url = "https://reviewhive-mu.vercel.app"
additional_redirect_urls = [
  "https://reviewhive-mu.vercel.app/*",
  "https://reviewhive-mu.vercel.app/#/login",
  "http://localhost:5000/*",
  "http://localhost:3000/*",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = true
enable_confirmations = true
# Configure MSG91 as a custom provider in the Supabase Dashboard → Auth → Providers
# for WhatsApp OTP delivery. See SETUP.md step 7.

[functions.apply-to-campaign]
verify_jwt = true

[functions.approve-application]
verify_jwt = true

[functions.reject-application]
verify_jwt = true

[functions.send-email]
verify_jwt = false  # internal callers pass service-role bearer

[functions.trigger-payout]
verify_jwt = true

[functions.verify-review-link]
verify_jwt = true
